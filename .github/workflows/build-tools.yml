name: Build-Tools Environment Auditor

on:
  workflow_dispatch: # 手动触发，方便调试
  workflow_call:     # 供主流程调用

jobs:
  audit_environment:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Prepare Workspace
        run: |
          mkdir -p audit_workspace/prebuilts
          mkdir -p audit_workspace/common

      - name: Download and Extract Build-Tools
        run: |
          cd audit_workspace
          # 替换为你的真实下载链接
          aria2c -s16 -x16 -k1M "https://github.com/MidoriKSU/dami-kernel-build/releases/download/0/build-tools.zip" -o build-tools.zip
          unzip -q build-tools.zip -d prebuilts/
          rm build-tools.zip
          
          # 关键步：强制修正包内所有 bin 目录的可执行权限 (防止打包者疏忽)
          find prebuilts -type d -name "bin" -exec chmod -R +x {} +
          find prebuilts -type f -executable -exec chmod +x {} +

      - name: Deep Analysis of Toolchain
        run: |
          cd audit_workspace/prebuilts
          echo "========= 🛠️ 工具链指纹审计 ========="
          
          # 1. 查找 Clang 路径并验证版本
          CLANG_BIN=$(find . -name "clang" -type f | head -n 1)
          if [ -n "$CLANG_BIN" ]; then
            echo "Found Clang at: $CLANG_BIN"
            $CLANG_BIN --version
          else
            echo "❌ Error: Clang not found in zip!"
          fi

          # 2. 检查 Rust & Bindgen
          BINDGEN_BIN=$(find . -name "bindgen" -type f | head -n 1)
          if [ -n "$BINDGEN_BIN" ]; then
            echo "Found Bindgen at: $BINDGEN_BIN"
            $BINDGEN_BIN --version
          fi

          # 3. 审计关键构建工具 (dtc, lz4, mkbootimg)
          echo "Checking Build Utilities..."
          for tool in dtc lz4 mkbootimg; do
            TOOL_PATH=$(find . -name "$tool" -type f | head -n 1)
            [ -n "$TOOL_PATH" ] && echo "✅ $tool: Found at $TOOL_PATH" || echo "⚠️ $tool: Missing"
          done

          # 4. 软链接一致性分析
          echo "Checking Symlinks..."
          find . -type l -ls | awk '{print $11 " -> " $13}'

      - name: Full Depth Filesystem Scan
        run: |
          cd audit_workspace/prebuilts
          echo "=========================================================="
          echo "📂 1. 完整目录树扫描 (Tree Structure)"
          echo "=========================================================="
          find . -maxdepth 4 -not -path '*/.*'
          
          echo -e "\n=========================================================="
          echo "符号 2. 关键二进制文件详细属性 (Binary Details)"
          echo "=========================================================="
          # 扫描所有 bin 目录下的文件属性
          find . -type f -path "*/bin/*" -exec file {} \;
          
          echo -e "\n=========================================================="
          echo "🔗 3. 软链接完整路径审计 (Link Audit)"
          echo "=========================================================="
          # 找出所有链接并显示它们的真实指向，判断是否有死链
          find . -type l -exec ls -l {} \;
          
          echo -e "\n=========================================================="
          echo "🧪 4. 动态库依赖深度审计 (Shared Library Check)"
          echo "=========================================================="
          # 随便挑一个核心工具（比如 dtc），看看它到底在找哪些 .so
          DTC_PATH=$(find . -name "dtc" -type f | head -n 1)
          if [ -n "$DTC_PATH" ]; then
            echo "Checking dependencies for $DTC_PATH:"
            ldd "$DTC_PATH" || readelf -d "$DTC_PATH" | grep NEEDED
          fi

      - name: Save Environment Report
        uses: actions/upload-artifact@v4
        with:
          name: toolchain-audit-report
          path: audit_workspace/prebuilts
