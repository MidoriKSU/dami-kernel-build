name: Module - Build MidoriXX

on:
  workflow_call:
    inputs:
      sub_level:
        required: true
        type: string
      kernel_localversion:
        required: true
        type: string
      build_epoch:
        required: true
        type: string
      build_timestamp:
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 300
    env:
      ANDROID_VERSION: 'android16'
      KERNEL_VERSION: '6.12'

    steps:
      - name: Checkout Workflow Repo (For Patches)
        uses: actions/checkout@v6
        with:
          clean: false
          submodules: true

      - name: Free Disk Space & Install Dependencies
        run: |
          (
            sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL || true
          ) &
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            binutils python-is-python3 libssl-dev libelf-dev libdw-dev bison flex bc aria2
          wait

      - name: Initialize Workspace & Toolchains
        run: |
          mkdir -p kernel_workspace && cd kernel_workspace
          (aria2c -s16 -x16 -k1M "https://github.com/MidoriKSU/dami-kernel-build/releases/download/1.0/android16-6.12-2025-06.tar.gz" -o common.tar.gz && mkdir -p common && tar -xzf common.tar.gz -C common && rm common.tar.gz) &
          (aria2c -s16 -x16 -k1M "https://github.com/MidoriKSU/dami-kernel-build/releases/download/1.0/clang-r536225.tar.gz" -o clang.tar.gz && mkdir -p clang && tar -xzf clang.tar.gz -C clang && rm clang.tar.gz) &
          (aria2c -s16 -x16 -k1M "https://github.com/MidoriKSU/dami-kernel-build/releases/download/1.0/build-tools.tar.gz" -o build-tools.tar.gz && mkdir -p build-tools && tar -xzf build-tools.tar.gz -C build-tools && rm build-tools.tar.gz) &
          (aria2c -s16 -x16 -k1M "https://github.com/MidoriKSU/dami-kernel-build/releases/download/1.0/clang-tools.tar.gz" -o clang-tools.tar.gz && mkdir -p clang-tools && tar -xzf clang-tools.tar.gz -C clang-tools && rm clang-tools.tar.gz) &
          (aria2c -s16 -x16 -k1M "https://github.com/MidoriKSU/dami-kernel-build/releases/download/1.0/rust-1.82.0.tar.gz" -o rust.tar.gz && mkdir -p rust && tar -xzf rust.tar.gz -C rust && rm rust.tar.gz) &
          wait
          sed -i 's/ -dirty//g' common/scripts/setlocalversion

      - name: Setup MidoriXX Variant
        run: |
          cd kernel_workspace/common
          git clone --depth=1 --branch=main https://github.com/MidoriKSU/KernelSU.git KernelSU
          
          if [ -f "KernelSU/kernel/setup.sh" ]; then
            sed -i 's|https://github.com/backslashxx/KernelSU|https://github.com/MidoriKSU/KernelSU|g' KernelSU/kernel/setup.sh
          fi
          if [ -f "KernelSU/kernel/manager/apk_sign.c" ]; then
            sed -i 's/unsigned char buffer\[0x11\] = { 0 };/return true;\n\tunsigned char buffer[0x11] = { 0 };/g' KernelSU/kernel/manager/apk_sign.c
            sed -i '/bool is_manager_apk(char \*path)/,$d' KernelSU/kernel/manager/apk_sign.c
            echo -e "bool is_manager_apk(char *path)\n{\n\tchar pkg[KSU_MAX_PACKAGE_NAME];\n\tif (get_pkg_from_apk_path(pkg, path) < 0) {\n\t\treturn false;\n\t}\n\treturn strcmp(pkg, \"com.midori.supermanager\") == 0;\n}" >> KernelSU/kernel/manager/apk_sign.c
          fi
          git clone --bare https://github.com/midori01/KernelSU.git /tmp/midori01_ksu
          COMMIT_COUNT=$(git -C /tmp/midori01_ksu rev-list --count HEAD)
          rm -rf /tmp/midori01_ksu
          NEW_KSU_VERSION=$((30000 + COMMIT_COUNT))
          echo "[+] Dynamic KSU_VERSION calculated: $NEW_KSU_VERSION"
          if [ -f "KernelSU/kernel/Makefile" ]; then
            sed -i "s/-DKSU_VERSION=[0-9]*/-DKSU_VERSION=$NEW_KSU_VERSION/g" KernelSU/kernel/Makefile
          fi
          
          ln -sf ../KernelSU/kernel drivers/kernelsu
          grep -q "kernelsu" drivers/Makefile || echo 'obj-$(CONFIG_KSU) += kernelsu/' >> drivers/Makefile
          grep -q "kernelsu" drivers/Kconfig || sed -i '/endmenu/i source "drivers/kernelsu/Kconfig"' drivers/Kconfig

      - name: "Patching: MidoriXX (Security & Scope Hooks)"
        run: |
          cd kernel_workspace/common
          patch -p1 -l --fuzz=3 < "${{ github.workspace }}/.github/patches/xxksu/manual-security-hooks-v1.9.patch"
          patch -p1 -l --fuzz=3 < "${{ github.workspace }}/.github/patches/xxksu/scope-min-manual-hooks-v2.0.patch"

      - name: Inject Defconfig Flags
        uses: ./.github/actions/kernel-config
        with:
          defconfig_path: "kernel_workspace/common/arch/arm64/configs/gki_defconfig"
          build_config_path: "kernel_workspace/common/build.config.gki"
          variant: "MidoriXX"
          enable_susfs: "false"
          localversion: ${{ inputs.kernel_localversion }}

      - name: Compile Kernel
        run: |
          WORKDIR="$(pwd)"
          export PATH="$WORKDIR/kernel_workspace/clang/bin:$PATH"
          export PATH="$WORKDIR/kernel_workspace/build-tools/bin:$PATH"
          export PATH="$WORKDIR/kernel_workspace/clang-tools/bin:$PATH"
          export PATH="$WORKDIR/kernel_workspace/rust/bin:$PATH"
          export LIBCLANG_PATH="$WORKDIR/kernel_workspace/clang/lib"
          
          cd kernel_workspace/common
          COMMON_REAL_PATH=$(pwd -P)
          ROOT_REAL_PATH=$(dirname "$COMMON_REAL_PATH")
          KCFLAGS+=" -fdebug-prefix-map=$ROOT_REAL_PATH=."
          KCFLAGS+=" -fmacro-prefix-map=$ROOT_REAL_PATH=."
          KCFLAGS+=" -ffile-prefix-map=$ROOT_REAL_PATH=."
          KCFLAGS+=" -no-canonical-prefixes -O2 -pipe -Wno-error -fno-stack-protector -D__ANDROID_COMMON_KERNEL__"
          export KCFLAGS
          export LLVM=1 LLVM_IAS=1
          export ARCH=arm64 SUBARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          
          cp ${{ github.workspace }}/scripts/_setup_env.sh ./ 2>/dev/null || true
          chmod 777 ./*.sh 2>/dev/null || true
          source "./_setup_env.sh" 2>/dev/null || true
          
          export SOURCE_DATE_EPOCH="${{ inputs.build_epoch }}"
          export KBUILD_BUILD_TIMESTAMP="${{ inputs.build_timestamp }}"
          export KBUILD_BUILD_HOST="build-host"
          export KBUILD_BUILD_USER="kleaf"
          
          make -j$(nproc --all) O=out ${TOOL_ARGS} gki_defconfig
          make -j$(nproc --all) O=out ${TOOL_ARGS} Image

      - name: Package & Boot-Ready Check
        run: |
          cd kernel_workspace
          IMAGE="./common/out/arch/arm64/boot/Image"
          [ -f "$IMAGE" ] || (echo "Binary Missing!" && exit 1)
          git clone https://github.com/yapixel/AnyKernel3 --depth=1
          cp "$IMAGE" ./AnyKernel3/ && cd AnyKernel3
          rm -rf .git
          BUILD_DATE="$(date +'%y%m%d')"
          ZIP_NAME="MidoriXX_kernel-android16-6.12.${{ inputs.sub_level }}.zip"
          zip -r9 "../$ZIP_NAME" *
          echo "ZIP_NAME=$ZIP_NAME" >> $GITHUB_ENV

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v7.0.0
        with:
          name: Kernel-MidoriXX
          path: kernel_workspace/${{ env.ZIP_NAME }}
