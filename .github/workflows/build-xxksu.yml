name:  Module  Build xxKSU

on:
  workflow_call:
    inputs:
      sub_level:
        required: true
        type: string
      clang_release:
        required: false
        type: string
        default: '23.0.0git-20260130-release'
      clang_ver:
        required: false
        type: string
        default: '23.0.0git-20260130'
      gcc_ver:
        required: false
        type: string
        default: '15.2.rel1'

jobs:
  build:
    name:  xxKSU  6.12.${{ inputs.sub_level }}
    runs-on: ubuntu-latest
    timeout-minutes: 300
    env:
      ANDROID_VERSION: 'android16'
      KERNEL_VERSION: '6.12'

    steps:
      - name:  Checkout Repository
        uses: actions/checkout@v6
        with:
          clean: false
          submodules: true

      - name:  Free Disk Space & Install Dependencies
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL || true
          sudo docker image prune -af 2>/dev/null || true
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            binutils python-is-python3 libssl-dev libelf-dev libdw-dev \
            curl bison flex make git perl gcc bc zip unzip aria2

      - name: Initialize Toolchains
        run: |
          CLANG_RELEASE="${{ inputs.clang_release }}"
          CLANG_VER="${{ inputs.clang_ver }}"
          GCC_VER="${{ inputs.gcc_ver }}"
          CLANG_URL="https://github.com/ZyCromerZ/Clang/releases/download/${CLANG_RELEASE}/Clang-${CLANG_VER}.tar.gz"
          ARM64_URL="https://developer.arm.com/-/media/Files/downloads/gnu/${GCC_VER}/binrel/arm-gnu-toolchain-${GCC_VER}-x86_64-aarch64-none-linux-gnu.tar.xz"
          ARM32_URL="https://developer.arm.com/-/media/Files/downloads/gnu/${GCC_VER}/binrel/arm-gnu-toolchain-${GCC_VER}-x86_64-arm-none-eabi.tar.xz"
          
          wget -O clang.tar.gz "$CLANG_URL"
          mkdir -p "$GITHUB_WORKSPACE/clang" && tar -xf clang.tar.gz -C "$GITHUB_WORKSPACE/clang"
          
          wget -O arm64.tar.xz "$ARM64_URL"
          mkdir -p "$GITHUB_WORKSPACE/arm64-gcc" && tar -xf arm64.tar.xz -C "$GITHUB_WORKSPACE/arm64-gcc" --strip-components=1
          
          wget -O arm32.tar.xz "$ARM32_URL"
          mkdir -p "$GITHUB_WORKSPACE/arm32-gcc" && tar -xf arm32.tar.xz -C "$GITHUB_WORKSPACE/arm32-gcc" --strip-components=1

          echo ""
          echo "============================================"
          echo "       Toolchain Versions"
          echo "============================================"
          echo "Clang:   $("$GITHUB_WORKSPACE/clang/bin/clang" --version 2>/dev/null | head -1 || echo '❌ FAILED')"
          echo "lld:     $("$GITHUB_WORKSPACE/clang/bin/ld.lld" --version 2>/dev/null | head -1 || echo '❌ FAILED')"
          echo "ARM64:   $("$GITHUB_WORKSPACE/arm64-gcc/bin/aarch64-none-linux-gnu-gcc" --version 2>/dev/null | head -1 || echo '❌ FAILED')"
          echo "ARM32:   $("$GITHUB_WORKSPACE/arm32-gcc/bin/arm-none-eabi-gcc" --version 2>/dev/null | head -1 || echo '❌ FAILED')"
          echo "============================================"
          echo ""

      - name: Clone GKI Kernel
        run: |
          mkdir -p kernel_workspace && cd kernel_workspace
          git clone --depth=1 https://android.googlesource.com/kernel/common -b android16-6.12-2025-06 common

      - name:  Setup xxKSU
        run: |
          cd kernel_workspace/common
          git clone --depth=1 --branch=master https://github.com/backslashxx/KernelSU.git KernelSU
          ln -sf ../KernelSU/kernel drivers/kernelsu
          grep -q "kernelsu" drivers/Makefile || echo 'obj-$(CONFIG_KSU) += kernelsu/' >> drivers/Makefile
          grep -q "kernelsu" drivers/Kconfig || sed -i '/endmenu/i source "drivers/kernelsu/Kconfig"' drivers/Kconfig

      - name:  Create Patch Healer
        run: |
          cat > "${{ github.workspace }}/kernel_workspace/common/heal_patch.py" << 'PYEOF'
          import sys
          with open(sys.argv[1], 'r', encoding='utf-8') as f:
              lines = f.read().splitlines()
          with open(sys.argv[1], 'w', encoding='utf-8', newline='\n') as f:
              in_hunk = False
              for line in lines:
                  if line.startswith('@@ '): in_hunk = True; f.write(line + '\n'); continue
                  if line.startswith(('--- ', '+++ ')): in_hunk = False; f.write(line + '\n'); continue
                  if not in_hunk: f.write(line + '\n'); continue
                  if len(line) == 0: f.write(' \n')
                  elif line[0] not in ['+', '-', ' ', '\\']: f.write(' ' + line + '\n')
                  else: f.write(line + '\n')
          PYEOF

      - name:  Apply Patches  xxKSU (Security & Scope Hooks)
        run: |
          cd kernel_workspace/common
          python3 heal_patch.py "${{ github.workspace }}/.github/patches/xxksu/manual-security-hooks-v1.9.patch"
          patch -p1 -l --fuzz=3 < "${{ github.workspace }}/.github/patches/xxksu/manual-security-hooks-v1.9.patch"
          python3 heal_patch.py "${{ github.workspace }}/.github/patches/xxksu/scope-min-manual-hooks-v2.0.patch"
          patch -p1 -l --fuzz=3 < "${{ github.workspace }}/.github/patches/xxksu/scope-min-manual-hooks-v2.0.patch"

      - name:  Apply KMI Bypass
        run: |
          cd kernel_workspace/common
          sed -i '/bad_version:/,/^}/ s/return 0;/return 1;/' kernel/module/version.c

      - name:  Inject Defconfig Flags
        uses: ./.github/actions/kernel-config
        with:
          defconfig_path: "kernel_workspace/common/arch/arm64/configs/gki_defconfig"
          build_config_path: "kernel_workspace/common/build.config.gki"
          variant: "xxksu"
          enable_susfs: "false"

      - name:  Fix Localversion
        run: |
          echo 'echo ""' > kernel_workspace/common/scripts/setlocalversion

      - name:  Compile Kernel (Identity Spoofing)
        run: |
          CLANG_BIN="$GITHUB_WORKSPACE/clang/bin"
          ARM64_TOOLCHAIN="$GITHUB_WORKSPACE/arm64-gcc/bin/aarch64-none-linux-gnu-"
          ARM32_TOOLCHAIN="$GITHUB_WORKSPACE/arm32-gcc/bin/arm-none-eabi-"

          cd kernel_workspace/common

          cp "$GITHUB_WORKSPACE/lib/libfakestat.so" ./
          cp "$GITHUB_WORKSPACE/lib/libfaketimeMT.so" ./

          export ARCH=arm64
          export PATH="$CLANG_BIN:$GITHUB_WORKSPACE/arm64-gcc/bin:$GITHUB_WORKSPACE/arm32-gcc/bin:$PATH"
          export CROSS_COMPILE="$ARM64_TOOLCHAIN"
          export CROSS_COMPILE_COMPAT="$ARM32_TOOLCHAIN"
          export LD="$CLANG_BIN/ld.lld"
          export HOSTLD="$CLANG_BIN/ld.lld"
          export AR="$CLANG_BIN/llvm-ar"
          export HOSTAR="$CLANG_BIN/llvm-ar"
          export NM="$CLANG_BIN/llvm-nm"
          export OBJCOPY="$CLANG_BIN/llvm-objcopy"
          export OBJDUMP="$CLANG_BIN/llvm-objdump"
          export READELF="$CLANG_BIN/llvm-readelf"
          export STRIP="$CLANG_BIN/llvm-strip"
          export CLANG_TRIPLE="aarch64-linux-gnu-"

          cat > cc-wrapper <<-EOF
          #!/bin/bash
          if [[ "\$*" == *"--version"* ]]; then
              echo "Android (14043575, +pgo, +bolt, +lto, +mlgo, based on r536225) clang version 19.0.1 (https://android.googlesource.com/toolchain/llvm-project b3a530ec6537146650e42be89f1089e9a3588460), LLD 19.0.1"
              exit 0
          fi
          export LD_PRELOAD="$GITHUB_WORKSPACE/kernel_workspace/common/libfakestat.so $GITHUB_WORKSPACE/kernel_workspace/common/libfaketimeMT.so"
          export FAKESTAT="2025-09-12 04:57:41"
          export FAKETIME="@2025-09-12 04:57:41"
          exec "$CLANG_BIN/clang" "\$@"
          EOF
          chmod +x cc-wrapper

          export KBUILD_BUILD_USER="kleaf"
          export KBUILD_BUILD_HOST="build-host"
          export KBUILD_BUILD_TIMESTAMP="Fri Sep 12 04:57:41 UTC 2025"
          export CC="$(pwd)/cc-wrapper"

          make -j$(nproc --all) O=out \
            ARCH=arm64 LLVM=1 LLVM_IAS=1 \
            KCFLAGS="-Wno-default-const-init-var-unsafe -Wno-default-const-init-field-unsafe -Wno-unterminated-string-initialization" \
            CC="$CC" LD="$LD" AR="$AR" NM="$NM" OBJCOPY="$OBJCOPY" OBJDUMP="$OBJDUMP" \
            READELF="$READELF" STRIP="$STRIP" HOSTCC="$CC" HOSTCXX="$CC" \
            HOSTLD="$HOSTLD" HOSTAR="$HOSTAR" CLANG_TRIPLE="$CLANG_TRIPLE" \
            CROSS_COMPILE="$CROSS_COMPILE" CROSS_COMPILE_COMPAT="$CROSS_COMPILE_COMPAT" \
            gki_defconfig

          make -j$(nproc --all) O=out \
            ARCH=arm64 LLVM=1 LLVM_IAS=1 \
            KCFLAGS="-Wno-default-const-init-var-unsafe -Wno-default-const-init-field-unsafe -Wno-unterminated-string-initialization" \
            CC="$CC" LD="$LD" AR="$AR" NM="$NM" OBJCOPY="$OBJCOPY" OBJDUMP="$OBJDUMP" \
            READELF="$READELF" STRIP="$STRIP" HOSTCC="$CC" HOSTCXX="$CC" \
            HOSTLD="$HOSTLD" HOSTAR="$HOSTAR" CLANG_TRIPLE="$CLANG_TRIPLE" \
            CROSS_COMPILE="$CROSS_COMPILE" CROSS_COMPILE_COMPAT="$CROSS_COMPILE_COMPAT" \
            Image

      - name:  Package & Boot-Ready Check
        run: |
          cd kernel_workspace
          IMAGE="./common/out/arch/arm64/boot/Image"
          [ -f "$IMAGE" ] || (echo " Image binary missing!" && exit 1)

          git clone https://github.com/yapixel/AnyKernel3 --depth=1
          cp "$IMAGE" ./AnyKernel3/ && cd AnyKernel3

          BUILD_DATE="$(date +'%y%m%d')"
          ZIP_NAME="xxksu_popsicle_6.12.${{ inputs.sub_level }}-${BUILD_DATE}.zip"
          zip -r9 "../$ZIP_NAME" *
          echo "ZIP_NAME=$ZIP_NAME" >> $GITHUB_ENV

      - name:  Upload Build Artifact
        uses: actions/upload-artifact@v7.0.0
        with:
          name: kernel-xxksu
          path: kernel_workspace/${{ env.ZIP_NAME }}