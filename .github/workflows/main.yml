name: Build GKI for Nezha

on:
  workflow_dispatch:
    inputs:
      ksu_variant:
        description: 'KernelSU variant to build'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - MidoriSU-SuSFS
          - MidoriSU
          - MidoriXX
      sub_level:
        description: 'Kernel sublevel'
        required: true
        default: '69'
        type: string
      create_release:
        description: 'Publish a GitHub Release'
        required: false
        default: true
        type: boolean

permissions:
  contents: write
  packages: write

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.config.outputs.release_tag }}
    steps:
      - id: config
        run: echo "release_tag=$(date +'%y%m%d')" >> $GITHUB_OUTPUT

  build_susfs:
    needs: setup
    if: inputs.ksu_variant == 'all' || inputs.ksu_variant == 'MidoriSU-SuSFS'
    uses: ./.github/workflows/build-susfs.yml
    with:
      sub_level: ${{ inputs.sub_level }}

  build_midorisu:
    needs: setup
    if: inputs.ksu_variant == 'all' || inputs.ksu_variant == 'MidoriSU'
    uses: ./.github/workflows/build-midorisu.yml
    with:
      sub_level: ${{ inputs.sub_level }}

  build_midorixx:
    needs: setup
    if: inputs.ksu_variant == 'all' || inputs.ksu_variant == 'MidoriXX'
    uses: ./.github/workflows/build-midorixx.yml
    with:
      sub_level: ${{ inputs.sub_level }}

  release:
    needs: [setup, build_susfs, build_midorisu, build_midorixx]
    if: |
      always() && 
      inputs.create_release == true &&
      !contains(needs.*.result, 'failure') &&
      !contains(needs.*.result, 'cancelled')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v8
        with:
          pattern: 'Kernel-*'
          path: release_zips
          merge-multiple: true
    
      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "${{ needs.setup.outputs.release_tag }}"
          name: "GKI 6.12.${{ inputs.sub_level }} — ${{ needs.setup.outputs.release_tag }}"
          files: release_zips/*.zip
