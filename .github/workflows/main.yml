name: Build GKI Kernel

on:
  workflow_dispatch:
    inputs:
      device:
        description: 'Target device'
        required: true
        type: choice
        options:
          - popsicle
          - nezha
      toolchain:
        description: 'Toolchain'
        required: true
        type: choice
        options:
          - aosp-clang
          - zyc-clang
      sub_level:
        description: 'Kernel sublevel'
        required: false
        default: '23'
        type: string

jobs:
  build-xxksu:
    name: xxKSU ${{ inputs.device }} ${{ inputs.toolchain }}
    uses: ./.github/workflows/build-xxksu.yml
    with:
      device: ${{ inputs.device }}
      toolchain: ${{ inputs.toolchain }}
      sub_level: ${{ inputs.sub_level }}
