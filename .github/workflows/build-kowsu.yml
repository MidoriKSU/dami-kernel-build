name:  Module  Build KowSU

on:
  workflow_call:
    inputs:
      sub_level:
        required: true
        type: string

jobs:
  build:
    name:  KowSU  6.12.${{ inputs.sub_level }}
    runs-on: ubuntu-latest
    timeout-minutes: 300
    env:
      ANDROID_VERSION: 'android16'
      KERNEL_VERSION: '6.12'

    steps:
      - name:  Checkout Repository
        uses: actions/checkout@v6

      - name:  Free Disk Space & Install Dependencies
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL || true
          sudo docker image prune -af 2>/dev/null || true
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            binutils python-is-python3 libssl-dev libelf-dev libdw-dev \
            curl bison flex make git perl gcc bc zip unzip aria2

      - name: Initialize Toolchains
        run: |
          WORKDIR="$GITHUB_WORKSPACE/kernel_workspace"
          mkdir -p "$WORKDIR" && cd "$WORKDIR"
          
          wget -O clang.tar.gz https://github.com/ZyCromerZ/Clang/releases/download/23.0.0git-20260130-release/Clang-23.0.0git-20260130.tar.gz
          mkdir -p clang23 && tar -xf clang.tar.gz -C clang23 --strip-components=1
          
          wget -O arm64.tar.xz https://developer.arm.com/-/media/Files/downloads/gnu/15.2.rel1/binrel/arm-gnu-toolchain-15.2.rel1-x86_64-aarch64-none-linux-gnu.tar.xz
          mkdir -p arm64-gcc && tar -xf arm64.tar.xz -C arm64-gcc --strip-components=1
          
          wget -O arm32.tar.xz https://developer.arm.com/-/media/Files/downloads/gnu/15.2.rel1/binrel/arm-gnu-toolchain-15.2.rel1-x86_64-arm-none-eabi.tar.xz
          mkdir -p arm32-gcc && tar -xf arm32.tar.xz -C arm32-gcc --strip-components=1
          
          curl -Lso libfakestat.so https://raw.githubusercontent.com/5ec1cff/KernelSU/refs/heads/fakestat/libfakestat.so
          
          echo "CLANG_DIR=$WORKDIR/clang23" >> $GITHUB_ENV
          echo "ARM64_GCC_DIR=$WORKDIR/arm64-gcc" >> $GITHUB_ENV
          echo "ARM32_GCC_DIR=$WORKDIR/arm32-gcc" >> $GITHUB_ENV

      # ========== 3. GKI 内核 ==========
      - name: Clone GKI Kernel
        run: |
          cd kernel_workspace
          git clone --depth=1 https://android.googlesource.com/kernel/common -b android16-6.12-2025-06 common
          sed -i 's/ -dirty//g' common/scripts/setlocalversion

      - name:  Setup KowSU
        run: |
          cd kernel_workspace/common
          git clone --depth=1 --branch=master https://github.com/KOWX712/KernelSU.git KernelSU

          ln -sf ../KernelSU/kernel drivers/kernelsu
          grep -q "kernelsu" drivers/Makefile || echo 'obj-$(CONFIG_KSU) += kernelsu/' >> drivers/Makefile
          grep -q "kernelsu" drivers/Kconfig || sed -i '/endmenu/i source "drivers/kernelsu/Kconfig"' drivers/Kconfig

          # Standard header syncing for KowSU modular tree
          cp -r KernelSU/uapi KernelSU/kernel/uapi 2>/dev/null || true
          echo 'ccflags-y += -I$(srctree)/drivers/kernelsu' >> drivers/kernelsu/Makefile
          mkdir -p include/uapi
          cp -f KernelSU/kernel/policy/*.h include/uapi/ 2>/dev/null || true
          cp -f KernelSU/kernel/policy/*.h include/ 2>/dev/null || true
          cp -f KernelSU/kernel/include/*.h include/ 2>/dev/null || true
          cp -f KernelSU/kernel/uapi/*.h include/uapi/ 2>/dev/null || true

      - name:  Apply KMI Bypass
        run: |
          cd kernel_workspace/common
          sed -i '/bad_version:/,/^}/ s/return 0;/return 1;/' kernel/module/version.c

      - name:  Inject Defconfig Flags
        uses: ./.github/actions/kernel-config
        with:
          defconfig_path: "kernel_workspace/common/arch/arm64/configs/gki_defconfig"
          build_config_path: "kernel_workspace/common/build.config.gki"
          variant: "kowsu"
          enable_susfs: "false"

      - name:  Compile Kernel (Identity Spoofing)
        run: |
          WORKDIR="$(pwd)"
          REAL_CLANG="${{ env.CLANG_DIR }}/bin/clang"
          export PATH="${{ env.CLANG_DIR }}/bin:${{ env.ARM64_GCC_DIR }}/bin:${{ env.ARM32_GCC_DIR }}/bin:$PATH"

          cd kernel_workspace/common

          cat > cc-wrapper <<-EOF
          #!/bin/bash
          if [[ "\$*" == *"--version"* ]]; then
              echo "Android (14043575, +pgo, +bolt, +lto, +mlgo, based on r536225) clang version 19.0.1 (https://android.googlesource.com/toolchain/llvm-project b3a530ec6537146650e42be89f1089e9a3588460), LLD 19.0.1"
              exit 0
          fi
          export LD_PRELOAD="\$(pwd)/libfakestat.so \$(pwd)/libfaketimeMT.so"
          export FAKESTAT="2025-09-12 04:57:41"
          export FAKETIME="@2025-09-12 04:57:41"
          exec "$REAL_CLANG" "\$@"
          EOF
          chmod +x cc-wrapper

          export KBUILD_BUILD_USER="kleaf"
          export KBUILD_BUILD_HOST="build-host"
          export KBUILD_BUILD_TIMESTAMP="Fri Sep 12 04:57:41 UTC 2025"
          export ARCH=arm64
          export LLVM=1
          export LLVM_IAS=1
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CC="$(pwd)/cc-wrapper"
          export LD=ld.lld

          make -j$(nproc --all) O=out gki_defconfig
          make -j$(nproc --all) O=out Image

      - name:  Package & Boot-Ready Check
        run: |
          cd kernel_workspace
          IMAGE="./common/out/arch/arm64/boot/Image"
          [ -f "$IMAGE" ] || (echo " Image binary missing!" && exit 1)

          git clone https://github.com/yapixel/AnyKernel3 --depth=1
          cp "$IMAGE" ./AnyKernel3/ && cd AnyKernel3

          BUILD_DATE="$(date +'%y%m%d')"
          ZIP_NAME="kowsu_popsicle_6.12.${{ inputs.sub_level }}-${BUILD_DATE}.zip"
          zip -r9 "../$ZIP_NAME" *
          echo "ZIP_NAME=$ZIP_NAME" >> $GITHUB_ENV

      - name:  Upload Build Artifact
        uses: actions/upload-artifact@v7.0.0
        with:
          name: kernel-kowsu
          path: kernel_workspace/${{ env.ZIP_NAME }}