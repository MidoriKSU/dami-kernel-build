name: Module - Build MidoriSU

on:
  workflow_call:
    inputs:
      source_mirror:
        required: true
        type: string
      sub_level:
        required: true
        type: string
      asb_date:
        required: true
        type: string
      r_version:
        required: true
        type: string
      use_droidspaces:
        required: true
        type: boolean
      use_susfs:
        required: true
        type: boolean
      kernel_localversion:
        required: true
        type: string
      build_epoch:
        required: true
        type: string
      build_timestamp:
        required: true
        type: string
      build_user:
        required: true
        type: string
      build_host:
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 300
    env:
      ANDROID_VERSION: 'android16'
      KERNEL_VERSION: '6.12'
      ASB_DATE: ${{ inputs.asb_date }}
      R_SUFFIX: ${{ inputs.r_version != 'none' && format('_{0}', inputs.r_version) || '' }}
      DS_SUFFIX: ${{ inputs.use_droidspaces && '-Droidspaces' || '' }}
      SUSFS_SUFFIX: ${{ inputs.use_susfs && '-SuSFS' || '' }}

    steps:
      - name: Checkout Source
        uses: actions/checkout@v6
        with:
          clean: false

      - name: Free Disk Space & Install Dependencies
        run: |
          (
            sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL || true
          ) &
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            binutils python-is-python3 libssl-dev libelf-dev libdw-dev bison flex bc aria2
          wait

      - name: Initialize Workspace & Toolchains
        run: |
          mkdir -p kernel_workspace && cd kernel_workspace
          KERNEL_TAR="${ANDROID_VERSION}-${KERNEL_VERSION}-${ASB_DATE}${R_SUFFIX}.tar.gz"
          MIDORI_MIRROR="https://github.com/MidoriKSU/dami-kernel-build/releases/download/1.0"
          GOOGLE_MIRROR="https://android.googlesource.com/kernel/common/+archive/refs/tags"
          KERNEL_BASE_URL=$([ "${{ inputs.source_mirror }}" == "google" ] && echo "$GOOGLE_MIRROR" || echo "$MIDORI_MIRROR")
          (aria2c -s16 -x16 -k1M "$KERNEL_BASE_URL/$KERNEL_TAR" -o common.tar.gz && mkdir -p common && tar -xzf common.tar.gz -C common && rm common.tar.gz) &
          (aria2c -s16 -x16 -k1M "$MIDORI_MIRROR/clang-r536225.tar.gz" -o clang.tar.gz && mkdir -p clang && tar -xzf clang.tar.gz -C clang && rm clang.tar.gz) &
          (aria2c -s16 -x16 -k1M "$MIDORI_MIRROR/build-tools.tar.gz" -o build-tools.tar.gz && mkdir -p build-tools && tar -xzf build-tools.tar.gz -C build-tools && rm build-tools.tar.gz) &
          (aria2c -s16 -x16 -k1M "$MIDORI_MIRROR/clang-tools.tar.gz" -o clang-tools.tar.gz && mkdir -p clang-tools && tar -xzf clang-tools.tar.gz -C clang-tools && rm clang-tools.tar.gz) &
          (aria2c -s16 -x16 -k1M "$MIDORI_MIRROR/rust-1.82.0.tar.gz" -o rust.tar.gz && mkdir -p rust && tar -xzf rust.tar.gz -C rust && rm rust.tar.gz) &
          wait
          sed -i 's/ -dirty//g' common/scripts/setlocalversion

      - name: Sync SuSFS Source
        if: inputs.use_susfs
        run: |
          SUSFS_DIR="${{ github.workspace }}/susfs4ksu"
          git clone --depth=1 --branch=gki-android16-6.12 https://gitlab.com/simonpunk/susfs4ksu "$SUSFS_DIR"
          echo "SUSFS_DIR=$SUSFS_DIR" >> $GITHUB_ENV
          SUSFS_VERSION=$(grep -m1 'define SUSFS_VERSION' "$SUSFS_DIR/kernel_patches/include/linux/susfs.h" | sed 's/.*"\(.*\)"/\1/')
          echo "SUSFS_VERSION=${SUSFS_VERSION:-unknown}" >> $GITHUB_ENV

      - name: Setup KernelSU Variant (MidoriSU)
        run: |
          cd kernel_workspace/common
          git clone --depth=1 --branch=main https://github.com/midori01/KernelSU.git KernelSU
          ln -sf ../KernelSU/kernel drivers/kernelsu
          grep -q "kernelsu" drivers/Makefile || echo 'obj-$(CONFIG_KSU) += kernelsu/' >> drivers/Makefile
          grep -q "drivers/kernelsu/Kconfig" drivers/Kconfig || sed -i '/endmenu/i source "drivers/kernelsu/Kconfig"' drivers/Kconfig
          cp -r KernelSU/uapi KernelSU/kernel/uapi 2>/dev/null || true
          echo 'ccflags-y += -I$(srctree)/drivers/kernelsu' >> drivers/kernelsu/Makefile
          mkdir -p include/uapi
          cp -f KernelSU/kernel/policy/*.h include/uapi/ 2>/dev/null || true
          cp -f KernelSU/kernel/policy/*.h include/ 2>/dev/null || true
          cp -f KernelSU/kernel/include/*.h include/ 2>/dev/null || true
          cp -f KernelSU/kernel/uapi/*.h include/uapi/ 2>/dev/null || true

      - name: "Patching: MidoriSU + SuSFS"
        if: inputs.use_susfs
        run: |
          cd kernel_workspace/common
          cp "${{ env.SUSFS_DIR }}/kernel_patches/fs/susfs.c" fs/
          cp "${{ env.SUSFS_DIR }}/kernel_patches/include/linux/susfs.h" include/linux/
          cp "${{ env.SUSFS_DIR }}/kernel_patches/include/linux/susfs_def.h" include/linux/
          patch -p1 < "${{ env.SUSFS_DIR }}/kernel_patches/50_add_susfs_in_gki-android16-6.12.patch"
          cd KernelSU
          patch -p1 -l < "${{ github.workspace }}/.github/patches/10_enable_susfs_for_ksu.patch"

      - name: Integrate Droidspaces Support
        if: inputs.use_droidspaces
        run: |
          cd kernel_workspace/common
          patch -p1 --forward < "${{ github.workspace }}/.github/patches/fix_sysvipc_kabi.patch" || true
          chmod +x "${{ github.workspace }}/.github/scripts/_setup_droidspaces.sh"
          bash "${{ github.workspace }}/.github/scripts/_setup_droidspaces.sh"

      - name: Inject Kernel Configs
        uses: ./.github/actions/kernel-config
        with:
          defconfig_path: "kernel_workspace/common/arch/arm64/configs/gki_defconfig"
          build_config_path: "kernel_workspace/common/build.config.gki"
          variant: "MidoriSU${{ inputs.use_susfs && '-SuSFS' || '' }}"
          enable_susfs: ${{ inputs.use_susfs }}
          localversion: ${{ inputs.kernel_localversion }}
          use_droidspaces: ${{ inputs.use_droidspaces }}

      - name: Compile Kernel
        run: |
          WORKDIR="$(pwd)"
          export PATH="$WORKDIR/kernel_workspace/clang/bin:$PATH"
          export PATH="$WORKDIR/kernel_workspace/build-tools/bin:$PATH"
          export PATH="$WORKDIR/kernel_workspace/clang-tools/bin:$PATH"
          export PATH="$WORKDIR/kernel_workspace/rust/bin:$PATH"
          export LIBCLANG_PATH="$WORKDIR/kernel_workspace/clang/lib"
          
          cd kernel_workspace/common
          COMMON_REAL_PATH=$(pwd -P)
          ROOT_REAL_PATH=$(dirname "$COMMON_REAL_PATH")
          KCFLAGS+=" -fdebug-prefix-map=$ROOT_REAL_PATH=."
          KCFLAGS+=" -fmacro-prefix-map=$ROOT_REAL_PATH=."
          KCFLAGS+=" -ffile-prefix-map=$ROOT_REAL_PATH=."
          KCFLAGS+=" -no-canonical-prefixes -O2 -pipe -Wno-error -fno-stack-protector -D__ANDROID_COMMON_KERNEL__"
          export KCFLAGS
          export LLVM=1 LLVM_IAS=1
          export ARCH=arm64 SUBARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          
          cp "${{ github.workspace }}/.github/scripts/_setup_env.sh" ./ 2>/dev/null || true
          chmod 777 ./*.sh 2>/dev/null || true
          source "./_setup_env.sh" 2>/dev/null || true
          
          export SOURCE_DATE_EPOCH="${{ inputs.build_epoch }}"
          export KBUILD_BUILD_TIMESTAMP="${{ inputs.build_timestamp }}"
          export KBUILD_BUILD_HOST="${{ inputs.build_host }}"
          export KBUILD_BUILD_USER="${{ inputs.build_user }}"
          
          make -j$(nproc --all) O=out ${TOOL_ARGS} gki_defconfig
          make -j$(nproc --all) O=out ${TOOL_ARGS} Image

      - name: Package & Boot-Ready Check
        run: |
          cd kernel_workspace
          IMAGE="./common/out/arch/arm64/boot/Image"
          [ -f "$IMAGE" ] || (echo "Binary Missing!" && exit 1) 
          git clone https://github.com/midori01/AnyKernel3 -b xiaomi --depth=1
          cp "$IMAGE" ./AnyKernel3/ && cd AnyKernel3
          rm -rf .git
          ZIP_NAME="MidoriSU_Kernel-${KERNEL_VERSION}.${{ inputs.sub_level }}${R_SUFFIX}${SUSFS_SUFFIX}${DS_SUFFIX}.zip"
          ARTIFACT_NAME="Kernel-MidoriSU${SUSFS_SUFFIX}${DS_SUFFIX}${R_SUFFIX}"
          zip -r9 "../$ZIP_NAME" *
          echo "ZIP_NAME=$ZIP_NAME" >> $GITHUB_ENV
          echo "ARTIFACT_NAME=$ARTIFACT_NAME" >> $GITHUB_ENV

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v7.0.0
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: kernel_workspace/${{ env.ZIP_NAME }}
