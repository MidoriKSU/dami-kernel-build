name: Build and Release

on:
  workflow_dispatch:
    inputs:
      source_mirror:
        description: 'Kernel Source'
        required: true
        default: 'google'
        type: choice
        options:
          - google
          - midori
      sub_level:
        description: 'Kernel Sublevel'
        required: true
        default: '23'
        type: choice
        options:
          - '23'
      r_version:
        description: 'Kernel Revision'
        required: true
        default: 'r58'
        type: choice
        options:
          - r58
          - none
      ksu_variant:
        description: 'KernelSU Variant'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - MidoriSU
          - MidoriXX
      create_release:
        description: 'Publish Release'
        required: false
        default: true
        type: boolean
      enable_susfs:
        description: 'SuSFS (MidoriSU)'
        required: true
        default: true
        type: boolean
      use_droidspaces:
        description: 'Droidspaces'
        required: true
        default: true
        type: boolean
      build_scene_hider:
        description: 'eBPF (Scene Hider)'
        required: true
        default: true
        type: boolean
      kernel_localversion:
        description: 'Spoof Kernel Name'
        required: true
        default: '-android16-5-g5a0e85dd9db0-ab14499855-4k'
        type: string
      build_timestamp:
        description: 'Spoof Build Time'
        required: true
        default: 'Wed Nov 26 11:16:14 UTC 2025'
        type: string
      build_user:
        description: 'Spoof Build User'
        required: true
        default: 'kleaf'
        type: string
      build_host:
        description: 'Spoof Build Host'
        required: true
        default: 'build-host'
        type: string
      build_epoch:
        description: 'SOURCE_DATE_EPOCH'
        required: true
        default: '1764155774'
        type: string
      clang_version:
        description: 'Compiler Version'
        required: true
        default: 'clang-r536225'
        type: choice
        options:
          - clang-r536225
          - clang-r547379
      rust_version:
        description: 'Rust Version'
        required: true
        default: 'rust-1.82.0'
        type: choice
        options:
          - rust-1.82.0
          - rust-1.82.0.p1
          - rust-1.83.0

permissions:
  contents: write
  packages: write

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.config.outputs.release_tag }}
      build_matrix: ${{ steps.config.outputs.build_matrix }}
      asb_date: ${{ steps.parse_config.outputs.asb_date }}
      r_version: ${{ steps.parse_config.outputs.r_version }}
      r_suffix: ${{ steps.config.outputs.r_suffix }}
      source_base_url: ${{ steps.config.outputs.source_base_url }}
      mirror_name: ${{ steps.config.outputs.mirror_name }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - id: config
        name: Prepare build matrix and metadata
        run: |
          echo "release_tag=build-$(date +'%y%m%d%H%M%S')" >> $GITHUB_OUTPUT
          if [ "${{ inputs.r_version }}" != "none" ]; then
            echo "r_suffix=_${{ inputs.r_version }}" >> $GITHUB_OUTPUT
          else
            echo "r_suffix=" >> $GITHUB_OUTPUT
          fi
          if [ "${{ inputs.source_mirror }}" == "google" ]; then
            echo "source_base_url=https://android.googlesource.com/kernel/common/+archive/refs/tags" >> $GITHUB_OUTPUT
            echo "mirror_name=Google Official" >> $GITHUB_OUTPUT
          else
            echo "source_base_url=https://github.com/MidoriKSU/dami-kernel-build/releases/download/1.0" >> $GITHUB_OUTPUT
            echo "mirror_name=Midori Mirror" >> $GITHUB_OUTPUT
          fi

          MATRIX='{"include":[]}'
          if [ "${{ inputs.ksu_variant }}" == "all" ] || [ "${{ inputs.ksu_variant }}" == "MidoriSU" ]; then
            DS_LIST="false"
            [ "${{ inputs.use_droidspaces }}" == "true" ] && DS_LIST="false true"
            SUS_LIST="false"
            [ "${{ inputs.enable_susfs }}" == "true" ] && SUS_LIST="false true"
            for DS in $DS_LIST; do
              for SUS in $SUS_LIST; do
                MATRIX=$(echo "$MATRIX" | jq -c '.include += [{"variant":"MidoriSU","droidspaces":'$DS',"susfs":'$SUS'}]')
              done
            done
          fi
          if [ "${{ inputs.ksu_variant }}" == "all" ] || [ "${{ inputs.ksu_variant }}" == "MidoriXX" ]; then
            DS_LIST="false"
            [ "${{ inputs.use_droidspaces }}" == "true" ] && DS_LIST="false true"
            for DS in $DS_LIST; do
              MATRIX=$(echo "$MATRIX" | jq -c '.include += [{"variant":"MidoriXX","droidspaces":'$DS',"susfs":false}]')
            done
          fi
          echo "build_matrix=$MATRIX" >> $GITHUB_OUTPUT

      - id: parse_config
        name: Validate and resolve kernel config
        run: |
          SUB_LEVEL="${{ inputs.sub_level }}"
          INPUT_R="${{ inputs.r_version }}"
          CONFIG_FILE=".github/config/kernel_versions.json"
          CONFIG=$(jq -c '.["'$SUB_LEVEL'"]' "$CONFIG_FILE")
          if [ "$CONFIG" == "null" ] || [ -z "$CONFIG" ]; then
            echo "::error::Sublevel $SUB_LEVEL is not defined in $CONFIG_FILE!"
            exit 1
          fi
          ASB_DATE=$(echo "$CONFIG" | jq -r '.asb_date')
          DEFAULT_R=$(echo "$CONFIG" | jq -r '.default_r')
          IS_SUPPORTED=$(echo "$CONFIG" | jq -r '.supported_r | index("'$INPUT_R'")')
          if [ "$IS_SUPPORTED" != "null" ]; then
            FINAL_R="$INPUT_R"
          else
            echo "::warning::Revision '$INPUT_R' is NOT supported for Sublevel $SUB_LEVEL. Fallback to '$DEFAULT_R'."
            FINAL_R="$DEFAULT_R"
          fi
          echo "asb_date=$ASB_DATE" >> $GITHUB_OUTPUT
          echo "r_version=$FINAL_R" >> $GITHUB_OUTPUT

  build:
    name: "${{ matrix.variant }} (DS: ${{ matrix.droidspaces }}${{ matrix.susfs && format(' SuSFS: {0}', matrix.susfs) || '' }})"
    needs: setup
    if: needs.setup.outputs.build_matrix != '{"include":[]}'
    strategy:
      matrix: ${{ fromJson(needs.setup.outputs.build_matrix) }}
    uses: ./.github/workflows/build-kernel.yml
    with:
      variant: ${{ matrix.variant }}
      source_mirror: ${{ inputs.source_mirror }}
      sub_level: ${{ inputs.sub_level }}
      asb_date: ${{ needs.setup.outputs.asb_date }}
      r_version: ${{ needs.setup.outputs.r_version }}
      use_droidspaces: ${{ matrix.droidspaces }}
      use_susfs: ${{ matrix.susfs }}
      build_ebpf: ${{ inputs.build_scene_hider }}
      kernel_localversion: ${{ inputs.kernel_localversion }}
      build_epoch: ${{ inputs.build_epoch }}
      build_timestamp: ${{ inputs.build_timestamp }}
      build_user: ${{ inputs.build_user }}
      build_host: ${{ inputs.build_host }}
      clang_version: ${{ inputs.clang_version }}
      rust_version: ${{ inputs.rust_version }}

  build_scene_hider:
    name: "Scene Port Hider (eBPF)"
    needs: [setup, build]
    if: always() && inputs.build_scene_hider && !contains(needs.*.result, 'failure') && !contains(needs.*.result, 'cancelled')
    uses: ./.github/workflows/build-ebpf.yml

  release:
    needs: [setup, build, build_scene_hider]
    if: always() && inputs.create_release && !contains(needs.*.result, 'failure') && !contains(needs.*.result, 'cancelled')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          pattern: 'Kernel-*'
          path: release_zips
          merge-multiple: true

      - uses: actions/download-artifact@v8
        if: inputs.build_scene_hider == true
        with:
          name: ScenePortHider-eBPF
          path: release_zips

      - name: Download MidoriSU Manager APK
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download --repo midori01/KernelSU --pattern "*.apk" --dir release_zips

      - name: Download KSU Toolkit Module
        id: download_toolkit
        run: |
          PREVIEW_URL="https://nightly.link/backslashxx/ksu_toolkit/workflows/module/master?preview"
          DOWNLOAD_URL=$(curl -sL "$PREVIEW_URL" | grep -oP 'https://nightly\.link/backslashxx/ksu_toolkit/workflows/module/master/ksu_toolkit-\d+\.zip' | head -n 1)
          if [ -z "$DOWNLOAD_URL" ]; then
            echo "::error::Failed to extract KSU Toolkit download link" >&2
            exit 1
          fi
          echo "Downloading: $DOWNLOAD_URL"
          TOOLKIT_FILENAME=$(basename "$DOWNLOAD_URL")
          echo "toolkit_filename=$TOOLKIT_FILENAME" >> $GITHUB_OUTPUT
          curl --fail -L -o "release_zips/${TOOLKIT_FILENAME}" "$DOWNLOAD_URL"

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "${{ needs.setup.outputs.release_tag }}"
          name: "Midori Kernel (${{ needs.setup.outputs.release_tag }})"
          body: |
            - **Kernel Source**: [${{ needs.setup.outputs.mirror_name }}](${{ needs.setup.outputs.source_base_url }}/android16-6.12-${{ needs.setup.outputs.asb_date }}${{ needs.setup.outputs.r_suffix }}.tar.gz)
            - **Kernel Version**: `android16-6.12.${{ inputs.sub_level }}${{ needs.setup.outputs.r_suffix }}`
            - **Compiler Version**: `${{ inputs.clang_version }}`
            - **Rust Version**: `${{ inputs.rust_version }}`
            - **Kernel Name (Spoofed)**: `6.12.${{ inputs.sub_level }}${{ inputs.kernel_localversion }}`
            - **Build Time (Spoofed)**: `${{ inputs.build_timestamp }}`
            - **Builder (Spoofed)**: `${{ inputs.build_user }}@${{ inputs.build_host }}`
            - **TMPFS**: ✅
            - **BBR**: ✅
            - **IPSET**: ✅
            - **SuSFS**: ${{ inputs.enable_susfs && '✅ `(*-SuSFS)`' || '❌' }}
            - **Docker**: ${{ inputs.use_droidspaces && '✅ `(*-Droidspaces)`' || '❌' }}
            - **eBPF (Scene Hider)**: ${{ inputs.build_scene_hider && '✅ `(ScenePortHider-eBPF.zip)`' || '❌' }}
            - **KSU Toolkit**: ✅ `(${{ steps.download_toolkit.outputs.toolkit_filename }})`
          files: |
            release_zips/*.zip
            release_zips/*.apk
