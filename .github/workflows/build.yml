name: Build Kernel

on:
  workflow_dispatch:
    inputs:
      source_mirror:
        description: 'Kernel Source'
        required: true
        default: 'midori'
        type: choice
        options:
          - midori
          - google
      sub_level:
        description: 'Kernel Sublevel'
        required: true
        default: '23'
        type: choice
        options:
          - '23'
      r_version:
        description: 'Kernel Revision'
        required: true
        default: 'r58'
        type: choice
        options:
          - r58
          - none
      ksu_variant:
        description: 'KernelSU Variant'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - MidoriSU
          - MidoriXX
      create_release:
        description: 'Publish Release'
        required: false
        default: true
        type: boolean
      enable_susfs:
        description: 'SuSFS (MidoriSU)'
        required: true
        default: true
        type: boolean
      use_droidspaces:
        description: 'Droidspaces'
        required: true
        default: true
        type: boolean
      build_scene_hider:
        description: 'eBPF (Scene Hider)'
        required: true
        default: true
        type: boolean
      kernel_localversion:
        description: 'Spoof Kernel Name'
        required: true
        default: '-android16-5-g5a0e85dd9db0-ab14499855-4k'
        type: string
      build_timestamp:
        description: 'Spoof Build Time'
        required: true
        default: 'Wed Nov 26 11:16:14 UTC 2025'
        type: string
      build_user:
        description: 'Spoof Build User'
        required: true
        default: 'kleaf'
        type: string
      build_host:
        description: 'Spoof Build Host'
        required: true
        default: 'build-host'
        type: string
      build_epoch:
        description: 'SOURCE_DATE_EPOCH'
        required: true
        default: '1764155774'
        type: string

permissions:
  contents: write
  packages: write

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.config.outputs.release_tag }}
      ds_matrix: ${{ steps.config.outputs.ds_matrix }}
      susfs_matrix: ${{ steps.config.outputs.susfs_matrix }}
      asb_date: ${{ steps.parse_config.outputs.asb_date }}
      r_version: ${{ steps.parse_config.outputs.r_version }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - id: config
        run: |
          echo "release_tag=$(date +'%y%m%d%H%M')" >> $GITHUB_OUTPUT
          if [ "${{ inputs.use_droidspaces }}" == "true" ]; then
            echo 'ds_matrix=[false, true]' >> $GITHUB_OUTPUT
          else
            echo 'ds_matrix=[false]' >> $GITHUB_OUTPUT
          fi
          if [ "${{ inputs.enable_susfs }}" == "true" ]; then
            echo 'susfs_matrix=[false, true]' >> $GITHUB_OUTPUT
          else
            echo 'susfs_matrix=[false]' >> $GITHUB_OUTPUT
          fi

      - id: parse_config
        name: Validate and Resolve Kernel Config
        run: |
          SUB_LEVEL="${{ inputs.sub_level }}"
          INPUT_R="${{ inputs.r_version }}"
          CONFIG_FILE=".github/config/kernel_versions.json"
          CONFIG=$(jq -c '.["'$SUB_LEVEL'"]' "$CONFIG_FILE")
          if [ "$CONFIG" == "null" ] || [ -z "$CONFIG" ]; then
            echo "::error::Sub level $SUB_LEVEL is not defined in $CONFIG_FILE!"
            exit 1
          fi
          ASB_DATE=$(echo "$CONFIG" | jq -r '.asb_date')
          DEFAULT_R=$(echo "$CONFIG" | jq -r '.default_r')
          IS_SUPPORTED=$(echo "$CONFIG" | jq -r '.supported_r | index("'$INPUT_R'")')
          if [ "$IS_SUPPORTED" != "null" ]; then
            FINAL_R="$INPUT_R"
          else
            echo "::warning::Revision '$INPUT_R' is NOT supported for sub_level $SUB_LEVEL. Fallback to '$DEFAULT_R'."
            FINAL_R="$DEFAULT_R"
          fi
          echo "asb_date=$ASB_DATE" >> $GITHUB_OUTPUT
          echo "r_version=$FINAL_R" >> $GITHUB_OUTPUT

  build_midorisu:
    name: "MidoriSU (DS: ${{ matrix.droidspaces }} | SuSFS: ${{ matrix.susfs }})"
    needs: setup
    if: inputs.ksu_variant == 'all' || inputs.ksu_variant == 'MidoriSU'
    strategy:
      matrix:
        droidspaces: ${{ fromJson(needs.setup.outputs.ds_matrix) }}
        susfs: ${{ fromJson(needs.setup.outputs.susfs_matrix) }}
    uses: ./.github/workflows/build-kernel.yml
    with:
      variant: 'MidoriSU'
      source_mirror: ${{ inputs.source_mirror }}
      sub_level: ${{ inputs.sub_level }}
      asb_date: ${{ needs.setup.outputs.asb_date }}
      r_version: ${{ needs.setup.outputs.r_version }}
      use_droidspaces: ${{ matrix.droidspaces }}
      use_susfs: ${{ matrix.susfs }}
      build_ebpf: ${{ inputs.build_scene_hider }}
      kernel_localversion: ${{ inputs.kernel_localversion }}
      build_epoch: ${{ inputs.build_epoch }}
      build_timestamp: ${{ inputs.build_timestamp }}
      build_user: ${{ inputs.build_user }}
      build_host: ${{ inputs.build_host }}

  build_midorixx:
    name: "MidoriXX (DS: ${{ matrix.droidspaces }})"
    needs: setup
    if: inputs.ksu_variant == 'all' || inputs.ksu_variant == 'MidoriXX'
    strategy:
      matrix:
        droidspaces: ${{ fromJson(needs.setup.outputs.ds_matrix) }}
    uses: ./.github/workflows/build-kernel.yml
    with:
      variant: 'MidoriXX'
      source_mirror: ${{ inputs.source_mirror }}
      sub_level: ${{ inputs.sub_level }}
      asb_date: ${{ needs.setup.outputs.asb_date }}
      r_version: ${{ needs.setup.outputs.r_version }}
      use_droidspaces: ${{ matrix.droidspaces }}
      use_susfs: false
      build_ebpf: ${{ inputs.build_scene_hider }}
      kernel_localversion: ${{ inputs.kernel_localversion }}
      build_epoch: ${{ inputs.build_epoch }}
      build_timestamp: ${{ inputs.build_timestamp }}
      build_user: ${{ inputs.build_user }}
      build_host: ${{ inputs.build_host }}

  build_scene_hider:
    name: "Scene Port Hider (eBPF)"
    needs: [setup, build_midorisu, build_midorixx]
    if: |
      always() && 
      inputs.build_scene_hider == true &&
      !contains(needs.*.result, 'failure') && 
      !contains(needs.*.result, 'cancelled')
    uses: ./.github/workflows/build-ebpf.yml

  release:
    needs: [setup, build_midorisu, build_midorixx, build_scene_hider]
    if: |
      always() && 
      inputs.create_release == true &&
      !contains(needs.*.result, 'failure') &&
      !contains(needs.*.result, 'cancelled')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      R_SUFFIX: ${{ needs.setup.outputs.r_version != 'none' && format('_{0}', needs.setup.outputs.r_version) || '' }}
      BASE_URL: ${{ inputs.source_mirror == 'google' && 'https://android.googlesource.com/kernel/common/+archive/refs/tags' || 'https://github.com/MidoriKSU/dami-kernel-build/releases/download/1.0' }}
      MIRROR_NAME: ${{ inputs.source_mirror == 'google' && 'Google Official' || 'Midori Mirror' }}

    steps:
      - uses: actions/checkout@v6
      
      - uses: actions/download-artifact@v8
        with:
          pattern: 'Kernel-*'
          path: release_zips
          merge-multiple: true
          
      - uses: actions/download-artifact@v8
        if: inputs.build_scene_hider == true
        with:
          name: ScenePortHider-eBPF
          path: release_zips
          
      - name: Download MidoriSU Manager APK
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download --repo midori01/KernelSU --pattern "*.apk" --dir release_zips
    
      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "${{ needs.setup.outputs.release_tag }}"
          name: "Kernel Midori Build (${{ needs.setup.outputs.release_tag }})"
          body: |
            - **Kernel Source**: [${{ env.MIRROR_NAME }}](${{ env.BASE_URL }}/android16-6.12-${{ needs.setup.outputs.asb_date }}${{ env.R_SUFFIX }}.tar.gz)
            - **Kernel Version**: `android16-6.12.${{ inputs.sub_level }}${{ env.R_SUFFIX }}`
            - **Kernel Name (Spoofed)**: `6.12.${{ inputs.sub_level }}${{ inputs.kernel_localversion }}`
            - **Build Time (Spoofed)**: `${{ inputs.build_timestamp }}`
            - **Builder (Spoofed)**: `${{ inputs.build_user }}@${{ inputs.build_host }}`
            - **TMPFS**: ✅
            - **BBR**: ✅
            - **IPSET**: ✅
            - **SuSFS**: ${{ inputs.enable_susfs && '✅ `(*-SuSFS)`' || '❌' }}
            - **Docker**: ${{ inputs.use_droidspaces && '✅ `(*-Droidspaces)`' || '❌' }}
            - **eBPF (Scene Hider)**: ${{ inputs.build_scene_hider && '✅' || '❌' }}
          files: |
            release_zips/*.zip
            release_zips/*.apk
